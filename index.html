<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="title" content="Your Page Title - Brand Name">
    <meta name="description" content="Your page description (150-160 characters)">
    <meta name="keywords" content="keyword1, keyword2, keyword3">
    <meta name="robots" content="index, follow">
    <meta name="language" content="English">
    <meta name="author" content="Your Name/Company">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/">
    <meta property="og:title" content="Your Page Title - Brand Name">
    <meta property="og:description" content="Your page description">
    <meta property="og:image" content="https://yourwebsite.com/image.jpg">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://yourwebsite.com/">
    <meta property="twitter:title" content="Your Page Title - Brand Name">
    <meta property="twitter:description" content="Your page description">
    <meta property="twitter:image" content="https://yourwebsite.com/image.jpg">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <title>To-Do List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
</head>

<body class="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header
            class="sticky top-0 z-10 bg-gray-50/90 dark:bg-gray-900/90 backdrop-blur-sm border-b border-gray-200 dark:border-gray-700">
            <div class="max-w-xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
                <h1 class="text-xl font-medium text-gray-800 dark:text-gray-100 tracking-wide">
                    To-Do List
                </h1>
                <button id="themeToggle"
                    class="p-2.5 rounded-lg text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors"
                    aria-label="Toggle theme">
                    <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 max-w-xl mx-auto w-full px-4 sm:px-6 py-8">
            <!-- Input Section -->
            <form id="taskForm" class="mb-8">
                <div class="relative">
                    <input type="text" id="taskInput" placeholder="Add a task..."
                        class="w-full px-4 py-3.5 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-xl text-gray-800 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 font-normal focus:outline-none focus:border-gray-500 dark:focus:border-gray-400 focus:ring-2 focus:ring-gray-500/20 dark:focus:ring-gray-400/20 transition-all shadow-sm"
                        maxlength="150" autocomplete="off">
                    <button type="submit"
                        class="absolute right-2 top-1/2 -translate-y-1/2 p-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors"
                        aria-label="Add task">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                    </button>
                </div>
            </form>

            <!-- Stats -->
            <div id="statsSection"
                class="hidden mb-6 flex items-center justify-between text-sm text-gray-500 dark:text-gray-400">
                <span id="taskStats"></span>
                <button id="clearCompleted"
                    class="hidden hover:text-red-600 dark:hover:text-red-400 transition-colors font-medium">
                    Clear completed
                </button>
            </div>

            <!-- Task List -->
            <div id="taskList" class="space-y-3">
                <!-- Tasks render here -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden py-16 text-center">
                <div
                    class="w-20 h-20 mx-auto mb-5 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center border border-gray-200 dark:border-gray-700">
                    <svg class="w-10 h-10 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                </div>
                <p class="text-gray-600 dark:text-gray-300 font-medium">No tasks yet</p>
                <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Add one above to get started</p>
            </div>
        </main>

        <!-- Footer hint -->
        <footer class="max-w-xl mx-auto w-full px-4 sm:px-6 pb-6">
            <p class="text-center text-sm text-gray-400 dark:text-gray-500">
                Drag to reorder · Double-click to edit
            </p>
        </footer>
    </div>
</body>
</html>
